<!-- @dsCard group="Web App" viewport="1280x800" name="Dashboard" subtitle="Interactive SaaS dashboard — sidebar, stats, analytics" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitrix Sales — Dashboard</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{height:100%;}
    body{font-family:'Manrope',system-ui,sans-serif;background:#F3F4F4;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#C8D2E4;border-radius:9999px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── Design tokens (inline for self-containment) ────────────────
const T = {
  primary500:'#3040CC', primary600:'#2430B0', primary700:'#192290',
  primary50:'#EEF1FF',  primary100:'#D4D9FD', primary200:'#ACB4FA',
  green600:'#0A9C50',   green50:'#EDFFF5',    green200:'#A0FFD0',
  red500:'#E01414',     red50:'#FFF0F0',      red200:'#FFAAAA',
  yellow50:'#FFFDE8',   yellow200:'#FFE890',  orange700:'#9A4C0E',  orange500:'#E07818',
  secBlue50:'#EBF8FF',  secBlue200:'#A6DCFF', secBlue500:'#1295E0', secBlue700:'#095E9A',
  neutral25:'#F8FAFD',  neutral50:'#F2F5F9',  neutral100:'#E4E9F2',
  neutral200:'#C8D2E4', neutral300:'#A8B6D4', neutral400:'#8898C0',
  neutral500:'#6880AB', neutral600:'#4E6690', neutral700:'#384C72',
  neutral800:'#243454', neutral900:'#131F38',
  white:'#FFFFFF',      black:'#000000',
  bgGrey:'#F3F4F4',
  shadow:{sm:'0 2px 6px rgba(0,0,0,0.07)', md:'0 4px 12px rgba(0,0,0,0.09)', lg:'0 8px 24px rgba(0,0,0,0.11)'},
  radius:{sm:'6px', md:'8px', lg:'12px', xl:'16px'},
};

// ─── Button ────────────────────────────────────────────────────
const BTN_SIZE = {
  XS:{height:'24px',padding:'0 10px',fontSize:'11px',gap:'4px'},
  S: {height:'28px',padding:'0 12px',fontSize:'12px',gap:'4px'},
  M: {height:'32px',padding:'0 14px',fontSize:'13px',gap:'6px'},
  L: {height:'40px',padding:'0 18px',fontSize:'14px',gap:'6px'},
  XL:{height:'44px',padding:'0 20px',fontSize:'14px',gap:'8px'},
  XXL:{height:'48px',padding:'0 24px',fontSize:'16px',gap:'8px'},
};
const BTN_VAR = {
  primary:       {bg:T.primary500, hov:T.primary600, act:T.primary700, color:T.white, border:'none'},
  'primary-light':{bg:T.primary50, hov:T.primary100, act:T.primary200, color:T.primary500, border:'none'},
  secondary:     {bg:'transparent', hov:T.primary50,  act:T.primary100, color:T.primary500, border:`1px solid ${T.primary500}`},
  ghost:         {bg:'transparent', hov:T.neutral50,  act:T.neutral100, color:T.neutral700, border:`1px solid ${T.neutral200}`},
  danger:        {bg:T.red500,      hov:'#BE0C0C',    act:'#960606',    color:T.white, border:'none'},
};
function Button({children, variant='primary', size='M', disabled=false, iconLeft=null, iconRight=null, onClick, type='button', fullWidth=false, style:ex={}}) {
  const [hov, setHov] = React.useState(false);
  const [act, setAct] = React.useState(false);
  const sz = BTN_SIZE[size]||BTN_SIZE.M, vr = BTN_VAR[variant]||BTN_VAR.primary;
  const bg = act ? vr.act : hov ? vr.hov : vr.bg;
  return (
    <button type={type} disabled={disabled} onClick={onClick}
      onMouseEnter={()=>!disabled&&setHov(true)} onMouseLeave={()=>{setHov(false);setAct(false);}}
      onMouseDown={()=>!disabled&&setAct(true)} onMouseUp={()=>setAct(false)}
      style={{display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit',fontWeight:600,borderRadius:T.radius.md,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.45:1,transition:'background 150ms ease',outline:'none',width:fullWidth?'100%':'auto',whiteSpace:'nowrap',lineHeight:1,letterSpacing:'-0.01em',background:bg,color:vr.color,border:vr.border||'none',...sz,...ex}}>
      {iconLeft&&<span style={{display:'flex',alignItems:'center',flexShrink:0}}>{iconLeft}</span>}
      {children}
      {iconRight&&<span style={{display:'flex',alignItems:'center',flexShrink:0}}>{iconRight}</span>}
    </button>
  );
}

// ─── Badge ─────────────────────────────────────────────────────
const BADGE_VAR = {
  primary:{bg:T.primary50,  color:T.primary600,  dot:T.primary500},
  info:   {bg:T.secBlue50,  color:T.secBlue700,  dot:T.secBlue500},
  success:{bg:'#EDFFF5',    color:T.green600,     dot:'#0EBD60'},
  warning:{bg:T.yellow50,   color:T.orange700,    dot:T.orange500},
  error:  {bg:'#FFF0F0',    color:'#BE0C0C',      dot:T.red500},
  neutral:{bg:T.neutral100, color:T.neutral700,   dot:T.neutral500},
};
function Badge({label, variant='neutral', size='md', showDot=false, style:ex={}}) {
  const v = BADGE_VAR[variant]||BADGE_VAR.neutral, sm = size==='sm';
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:'4px',padding:sm?'2px 6px':'3px 8px',borderRadius:T.radius.sm,background:v.bg,color:v.color,fontFamily:'inherit',fontSize:sm?'11px':'12px',fontWeight:500,lineHeight:1.4,whiteSpace:'nowrap',...ex}}>
      {showDot&&<span style={{width:sm?'5px':'6px',height:sm?'5px':'6px',borderRadius:'50%',background:v.dot,flexShrink:0}}/>}
      {label}
    </span>
  );
}

// ─── Avatar ────────────────────────────────────────────────────
const AV_SIZE = {xs:'24px',sm:'32px',md:'40px',lg:'48px',xl:'64px','2xl':'80px'};
const AV_FONT = {xs:'10px',sm:'12px',md:'14px',lg:'16px',xl:'20px','2xl':'24px'};
const AV_COLORS = [
  {bg:T.primary100, color:T.primary700}, {bg:'#FFD4A0', color:'#9A4C0E'},
  {bg:'#A0FFD0', color:'#077A3C'},       {bg:T.secBlue100||'#D0EEFF', color:T.secBlue700},
  {bg:'#FFE890', color:'#8A6402'},       {bg:'#FFAAAA', color:'#960606'},
];
function Avatar({src, initials, alt='', size='md', shape='circle', style:ex={}}) {
  const [err, setErr] = React.useState(false);
  const sz = AV_SIZE[size]||'40px', fz = AV_FONT[size]||'14px';
  const br = shape==='circle'?'50%':shape==='square'?T.radius.md:T.radius.sm;
  const {bg, color} = AV_COLORS[(initials||alt||'U').charCodeAt(0)%AV_COLORS.length];
  const base = {display:'inline-flex',alignItems:'center',justifyContent:'center',width:sz,height:sz,borderRadius:br,flexShrink:0,overflow:'hidden',fontFamily:'inherit',fontSize:fz,fontWeight:600,userSelect:'none',background:bg,color,...ex};
  if (src&&!err) return <div style={base}><img src={src} alt={alt} onError={()=>setErr(true)} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/></div>;
  const di = initials ? initials.slice(0,2).toUpperCase() : alt ? alt.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : 'U';
  return <div style={base}>{di}</div>;
}

// ─── Card ──────────────────────────────────────────────────────
const CARD_PAD = {none:'0',sm:'16px',md:'24px',lg:'32px'};
function Card({children, padding='md', hasBorder=true, shadow='md', radius='lg', background, style:ex={}, onClick}) {
  const [hov, setHov] = React.useState(false);
  const click = Boolean(onClick);
  const shadowMap = {none:'none',xs:'0 1px 2px rgba(0,0,0,0.05)',sm:T.shadow.sm,md:T.shadow.md,lg:T.shadow.lg};
  const radiusMap = {sm:T.radius.sm,md:T.radius.md,lg:T.radius.lg,xl:T.radius.xl};
  return (
    <div onClick={onClick}
      onMouseEnter={()=>click&&setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:background||T.white,borderRadius:radiusMap[radius]||T.radius.lg,boxShadow:click&&hov?T.shadow.lg:shadowMap[shadow]||shadowMap.md,border:hasBorder?`1px solid ${T.neutral200}`:'none',padding:CARD_PAD[padding]||CARD_PAD.md,transition:'box-shadow 150ms ease, transform 150ms ease',cursor:click?'pointer':'default',transform:click&&hov?'translateY(-1px)':'none',...ex}}>
      {children}
    </div>
  );
}

// ─── Alert ────────────────────────────────────────────────────
const ALERT_CFG = {
  info:   {bg:T.secBlue50, border:T.secBlue200, icon:T.secBlue500, title:T.secBlue700+'CC', text:T.secBlue700, d:'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z'},
  success:{bg:'#EDFFF5',  border:T.green200,   icon:'#0EBD60',    title:T.green600,        text:T.green600,  d:'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'},
  warning:{bg:T.yellow50, border:T.yellow200,  icon:T.orange500,  title:T.orange700,        text:T.orange700, d:'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z'},
  error:  {bg:'#FFF0F0',  border:T.red200,     icon:T.red500,     title:'#960606',         text:'#BE0C0C',   d:'M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z'},
};
function Alert({variant='info', title, description, onDismiss, isDismissible=true, actionLabel, onAction, style:ex={}}) {
  const [gone, setGone] = React.useState(false);
  if (gone) return null;
  const c = ALERT_CFG[variant]||ALERT_CFG.info;
  return (
    <div role="alert" style={{display:'flex',alignItems:'flex-start',gap:'12px',padding:'14px 16px',background:c.bg,border:`1px solid ${c.border}`,borderRadius:T.radius.lg,fontFamily:'inherit',...ex}}>
      <span style={{display:'flex',flexShrink:0,color:c.icon,marginTop:'1px'}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d={c.d}/></svg>
      </span>
      <div style={{flex:1,minWidth:0}}>
        {title&&<div style={{fontSize:'14px',fontWeight:600,color:c.title,lineHeight:1.4,marginBottom:description?'2px':0}}>{title}</div>}
        {description&&<div style={{fontSize:'13px',color:c.text,lineHeight:1.5}}>{description}</div>}
        {(actionLabel||isDismissible)&&(
          <div style={{display:'flex',gap:'12px',marginTop:'10px'}}>
            {actionLabel&&<button onClick={onAction} style={{background:'none',border:'none',padding:0,fontSize:'13px',fontWeight:600,color:c.icon,cursor:'pointer',fontFamily:'inherit'}}>{actionLabel}</button>}
          </div>
        )}
      </div>
      {isDismissible&&<button onClick={()=>{setGone(true);onDismiss&&onDismiss();}} style={{display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,width:'24px',height:'24px',background:'none',border:'none',cursor:'pointer',color:c.text,borderRadius:T.radius.sm,padding:0}} aria-label="Dismiss">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>}
    </div>
  );
}

// ─── Sidebar ───────────────────────────────────────────────────
const SB_ICONS = {
  dashboard:'M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z',
  calendar:'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z',
  notifications:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9',
  analytics:'M18 20V10M12 20V4M6 20v-6',
  settings:'M12 15a3 3 0 100-6 3 3 0 000 6zM19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z',
  support:'M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
  income:'M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
  logout:'M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1',
  search:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z',
  chevDown:'M19 9l-7 7-7-7',
};
function SbIcon({d,size=18}){return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;}
function SbItem({item, collapsed}){
  const [exp, setExp] = React.useState(false);
  const has = item.children&&item.children.length>0;
  const d = SB_ICONS[item.icon]||SB_ICONS.dashboard;
  const bg = item.isActive ? T.primary50 : 'transparent';
  const col = item.isActive ? T.primary600 : T.neutral600;
  const fw = item.isActive ? 600 : 400;
  return <>
    <div onClick={()=>has?setExp(v=>!v):item.onClick&&item.onClick()}
      style={{display:'flex',alignItems:'center',gap:'10px',padding:collapsed?'10px':'10px 12px',borderRadius:T.radius.md,cursor:'pointer',background:bg,color:col,fontSize:'14px',fontWeight:fw,justifyContent:collapsed?'center':'flex-start',transition:'background 150ms ease'}}
      onMouseEnter={e=>{if(!item.isActive){e.currentTarget.style.background=T.neutral50;e.currentTarget.style.color=T.neutral800;}}}
      onMouseLeave={e=>{if(!item.isActive){e.currentTarget.style.background=bg;e.currentTarget.style.color=col;}}}>
      <span style={{display:'flex',flexShrink:0,color:item.isActive?T.primary500:'inherit'}}><SbIcon d={d}/></span>
      {!collapsed&&<><span style={{flex:1}}>{item.label}</span>{has&&<span style={{display:'flex',transition:'transform 200ms',transform:exp?'rotate(180deg)':'none'}}><SbIcon d={SB_ICONS.chevDown} size={14}/></span>}</>}
    </div>
    {has&&exp&&!collapsed&&<div>{item.children.map((c,i)=><SbItem key={i} item={c} collapsed={false}/>)}</div>}
  </>;
}
function Sidebar({sections=[], items=[], isCollapsed=false, variant='light', logoText='Bitrix Sales', onLogout, style:ex={}}){
  const dark = variant==='dark';
  const bg = dark?'#111827':T.white;
  const br = dark?'none':`1px solid ${T.neutral200}`;
  const all = sections.length>0 ? sections.flatMap(s=>[{_sec:s.label},...s.items]) : items;
  return (
    <div style={{display:'flex',flexDirection:'column',width:isCollapsed?'64px':'240px',minHeight:'100vh',background:bg,borderRight:br,transition:'width 200ms ease',fontFamily:'inherit',flexShrink:0,overflow:'hidden',...ex}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:isCollapsed?'center':'flex-start',padding:'20px 16px',fontWeight:800,fontSize:'20px',color:dark?T.white:T.neutral900,letterSpacing:'-0.03em',borderBottom:`1px solid ${dark?'rgba(255,255,255,0.08)':T.neutral200}`}}>
        {isCollapsed?<span style={{display:'flex',alignItems:'center',justifyContent:'center',width:'32px',height:'32px',background:T.primary500,borderRadius:'8px',color:'#fff',fontSize:'13px',fontWeight:800}}>{logoText.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</span>:logoText}
      </div>
      {!isCollapsed&&<div style={{display:'flex',alignItems:'center',gap:'8px',margin:'12px 16px',padding:'8px 12px',borderRadius:T.radius.md,border:`1px solid ${dark?'rgba(255,255,255,0.12)':T.neutral200}`,background:dark?'rgba(255,255,255,0.05)':T.bgGrey,color:dark?'rgba(255,255,255,0.4)':T.neutral400,fontSize:'13px',cursor:'text'}}>
        <SbIcon d={SB_ICONS.search} size={14}/><span>Search</span>
      </div>}
      <div style={{flex:1,padding:'8px',display:'flex',flexDirection:'column',gap:'2px',overflowY:'auto'}}>
        {all.map((item,i)=>{
          if(item._sec) return !isCollapsed&&<div key={i} style={{padding:'16px 16px 4px',fontSize:'10px',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:dark?'rgba(255,255,255,0.35)':T.neutral400}}>{item._sec}</div>;
          const wrapped = dark?{...item,_dark:true}:item;
          return <div key={i} style={dark?{color:item.isActive?T.white:'rgba(255,255,255,0.65)'}:{}}><SbItem item={item} collapsed={isCollapsed}/></div>;
        })}
      </div>
      <div style={{padding:'8px',borderTop:`1px solid ${dark?'rgba(255,255,255,0.08)':T.neutral200}`}}>
        <div onClick={onLogout} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',borderRadius:T.radius.md,cursor:'pointer',color:dark?'rgba(255,255,255,0.55)':T.neutral500,fontSize:'14px',justifyContent:isCollapsed?'center':'flex-start'}}
          onMouseEnter={e=>{e.currentTarget.style.background=dark?'rgba(255,255,255,0.06)':T.neutral50;e.currentTarget.style.color=dark?T.white:T.neutral800;}}
          onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=dark?'rgba(255,255,255,0.55)':T.neutral500;}}>
          <SbIcon d={SB_ICONS.logout}/>{!isCollapsed&&<span>Logout</span>}
        </div>
      </div>
    </div>
  );
}

// ─── Shared icon helper ────────────────────────────────────────
function Ico({d,size=16}){return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;}
const I = {
  menu:'M3 6h18M3 12h18M3 18h18',
  bell:'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9',
  search:'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z',
  trendUp:'M23 6l-9.5 9.5-5-5L1 18', trendDown:'M23 18l-9.5-9.5-5 5L1 6',
  arr:'M5 12h14M12 5l7 7-7 7',
};

// ─── Sparkline ─────────────────────────────────────────────────
function Sparkline({data,color=T.primary500,height=36,width=72}){
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*width},${height-((v-min)/range)*(height-4)-2}`).join(' ');
  return <svg width={width} height={height} style={{display:'block'}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}

// ─── Bar chart ─────────────────────────────────────────────────
function BarChart({data,labels,height=180}){
  const max=Math.max(...data);
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:6,height,paddingBottom:20,position:'relative'}}>
      {[0,0.25,0.5,0.75,1].map(t=><div key={t} style={{position:'absolute',left:0,right:0,bottom:20+t*(height-20),borderTop:`1px solid ${T.neutral100||'#F2F5F9'}`,pointerEvents:'none'}}><span style={{fontSize:9,color:T.neutral400,position:'absolute',left:0,top:-9}}>{t===0?'0':`${Math.round(max*t/1000)}k`}</span></div>)}
      <div style={{flex:1,display:'flex',alignItems:'flex-end',gap:6,height:'100%',paddingLeft:28}}>
        {data.map((v,i)=>(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',height:'100%'}}>
            <div style={{width:'100%',maxWidth:32,height:`${(v/max)*(height-20)}px`,background:i===data.length-2?T.primary500:T.primary100,borderRadius:'4px 4px 0 0'}}/>
            <div style={{fontSize:10,color:T.neutral400,marginTop:4,whiteSpace:'nowrap'}}>{labels[i]}</div>
          </div>
        ))}
      </div>
    </div>
  );

// ─── App shell ──────────────────────────────────────────────────
const SECTIONS = [
  {label:'Main',items:[
    {label:'Dashboard',icon:'dashboard'},{label:'Income',icon:'income',children:[{label:'Overview'},{label:'Reports'}]},
    {label:'Calendar',icon:'calendar'},{label:'Notifications',icon:'notifications'},
  ]},
  {label:'Analytics',items:[{label:'Analytics',icon:'analytics'}]},
  {label:'Settings',items:[{label:'Settings',icon:'settings'},{label:'Support',icon:'support'}]},
];
const VIEWS = {dashboard:DashboardView,calendar:CalendarView,notifications:NotificationsView,analytics:AnalyticsView,settings:SettingsView,support:SupportView};

function App(){
  const [view,setView] = React.useState(()=>localStorage.getItem('bs_view')||'dashboard');
  const [col,setCol]   = React.useState(()=>localStorage.getItem('bs_col')==='true');
  const go = v => { setView(v); localStorage.setItem('bs_view',v); };
  const toggle = () => { const n=!col; setCol(n); localStorage.setItem('bs_col',String(n)); };
  const sections = SECTIONS.map(sec=>({...sec,items:sec.items.map(item=>({...item,isActive:item.label.toLowerCase()===view,onClick:()=>go(item.label.toLowerCase()),children:item.children?.map(c=>({...c,isActive:c.label.toLowerCase()===view,onClick:()=>go(c.label.toLowerCase())}))}))}));
  const View = VIEWS[view]||DashboardView;
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <Sidebar sections={sections} isCollapsed={col} variant="light" onLogout={()=>alert('Logged out')}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <TopBar onToggle={toggle} view={view}/>
        <div style={{flex:1,overflowY:'auto'}}><View/></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
