<!-- @dsCard group="Spacing" viewport="700x280" name="Effects" subtitle="Shadows · Radii · Focus rings" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 24px; background: var(--color-bg-grey); font-family: var(--font-primary); }
    .section-label { font-size: 10px; font-weight: 600; color: var(--color-neutral-400); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 12px; margin-top: 20px; }
    .section-label:first-child { margin-top: 0; }
    .shadows { display: flex; gap: 16px; flex-wrap: wrap; }
    .shadow-box { background: #fff; border-radius: var(--radius-md); display: flex; flex-direction: column; align-items: center; justify-content: center; width: 80px; height: 56px; }
    .shadow-label { font-size: 10px; color: var(--color-neutral-500); margin-top: 6px; }
    .radii { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .radius-box { background: var(--color-primary-100); border: 1.5px solid var(--color-primary-200); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .radius-label { font-size: 10px; color: var(--color-primary-600); padding: 6px; white-space: nowrap; }
    .focus-row { display: flex; gap: 12px; }
    .focus-demo { background: #fff; border-radius: var(--radius-md); padding: 10px 16px; font-size: 13px; color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="section-label">Shadows</div>
  <div class="shadows">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="shadow-box" style="box-shadow:var(--shadow-xs)"></div>
      <div class="shadow-label">xs</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="shadow-box" style="box-shadow:var(--shadow-sm)"></div>
      <div class="shadow-label">sm</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="shadow-box" style="box-shadow:var(--shadow-md)"></div>
      <div class="shadow-label">md</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="shadow-box" style="box-shadow:var(--shadow-lg)"></div>
      <div class="shadow-label">lg</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="shadow-box" style="box-shadow:var(--shadow-xl)"></div>
      <div class="shadow-label">xl</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="shadow-box" style="box-shadow:var(--shadow-2xl)"></div>
      <div class="shadow-label">2xl</div>
    </div>
  </div>

  <div class="section-label">Border Radii</div>
  <div class="radii">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="radius-box" style="width:40px;height:30px;border-radius:var(--radius-xs)"></div>
      <div class="radius-label">xs · 4px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="radius-box" style="width:48px;height:36px;border-radius:var(--radius-sm)"></div>
      <div class="radius-label">sm · 6px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="radius-box" style="width:56px;height:44px;border-radius:var(--radius-md)"></div>
      <div class="radius-label">md · 8px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="radius-box" style="width:64px;height:48px;border-radius:var(--radius-lg)"></div>
      <div class="radius-label">lg · 12px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="radius-box" style="width:72px;height:52px;border-radius:var(--radius-xl)"></div>
      <div class="radius-label">xl · 16px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="radius-box" style="width:80px;height:56px;border-radius:var(--radius-2xl)"></div>
      <div class="radius-label">2xl · 24px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="radius-box" style="width:80px;height:32px;border-radius:var(--radius-full)"></div>
      <div class="radius-label">full · pill</div>
    </div>
  </div>

  <div class="section-label">Focus Rings</div>
  <div class="focus-row">
    <div class="focus-demo" style="border:1px solid var(--color-primary-500);box-shadow:var(--focus-ring)">Default focus</div>
    <div class="focus-demo" style="border:1px solid var(--color-red-400);box-shadow:var(--focus-ring-error)">Error focus</div>
    <div class="focus-demo" style="border:1px solid var(--color-green-400);box-shadow:var(--focus-ring-success)">Success focus</div>
  </div>
</body>
</html>
