<!-- @dsCard group="Colors" viewport="700x400" name="Secondary Scales" subtitle="Blue · Yellow · Red · Green" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px; background: #fff; font-family: var(--font-primary); }
    .group { margin-bottom: 16px; }
    .group:last-child { margin-bottom: 0; }
    .label { font-size: 10px; font-weight: 600; color: var(--color-neutral-400); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
    .row { display: flex; gap: 5px; }
    .swatch { flex: 1; min-width: 0; }
    .block { height: 44px; border-radius: 5px; }
    .step { font-size: 9px; color: var(--color-neutral-400); margin-top: 3px; }
  </style>
</head>
<body>
  <div class="group">
    <div class="label">Secondary Blue</div>
    <div class="row">
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-50);border:1px solid #e8e8e8;"></div><div class="step">50</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-100);"></div><div class="step">100</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-200);"></div><div class="step">200</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-300);"></div><div class="step">300</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-400);"></div><div class="step">400</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-500);"></div><div class="step">500</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-600);"></div><div class="step">600</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-700);"></div><div class="step">700</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-800);"></div><div class="step">800</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-sec-blue-900);"></div><div class="step">900</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Yellow</div>
    <div class="row">
      <div class="swatch"><div class="block" style="background:var(--color-yellow-50);border:1px solid #e8e8e8;"></div><div class="step">50</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-100);"></div><div class="step">100</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-200);"></div><div class="step">200</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-300);"></div><div class="step">300</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-400);"></div><div class="step">400</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-500);"></div><div class="step">500</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-600);"></div><div class="step">600</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-700);"></div><div class="step">700</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-800);"></div><div class="step">800</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-yellow-900);"></div><div class="step">900</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Red</div>
    <div class="row">
      <div class="swatch"><div class="block" style="background:var(--color-red-50);border:1px solid #e8e8e8;"></div><div class="step">50</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-100);"></div><div class="step">100</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-200);"></div><div class="step">200</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-300);"></div><div class="step">300</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-400);"></div><div class="step">400</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-500);"></div><div class="step">500</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-600);"></div><div class="step">600</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-700);"></div><div class="step">700</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-800);"></div><div class="step">800</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-red-900);"></div><div class="step">900</div></div>
    </div>
  </div>
  <div class="group">
    <div class="label">Green</div>
    <div class="row">
      <div class="swatch"><div class="block" style="background:var(--color-green-50);border:1px solid #e8e8e8;"></div><div class="step">50</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-100);"></div><div class="step">100</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-200);"></div><div class="step">200</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-300);"></div><div class="step">300</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-400);"></div><div class="step">400</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-500);"></div><div class="step">500</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-600);"></div><div class="step">600</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-700);"></div><div class="step">700</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-800);"></div><div class="step">800</div></div>
      <div class="swatch"><div class="block" style="background:var(--color-green-900);"></div><div class="step">900</div></div>
    </div>
  </div>
</body>
</html>
