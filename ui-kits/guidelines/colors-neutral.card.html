<!-- @dsCard group="Colors" viewport="700x250" name="Neutral & Surfaces" subtitle="Grey scale · content · background" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px; background: #fff; font-family: var(--font-primary); }
    .label { font-size: 10px; font-weight: 600; color: var(--color-neutral-400); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    .label:first-child { margin-top: 0; }
    .row { display: flex; gap: 5px; }
    .swatch { flex: 1; min-width: 0; }
    .block { height: 44px; border-radius: 5px; }
    .step { font-size: 9px; color: var(--color-neutral-400); margin-top: 3px; }
    .sm-row { display: flex; gap: 8px; }
    .sm-swatch { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sm-block { width: 56px; height: 44px; border-radius: 5px; }
    .sm-name { font-size: 10px; color: var(--color-neutral-500); }
    .sm-hex  { font-size: 9px; color: var(--color-neutral-400); }
  </style>
</head>
<body>
  <div class="label">Neutral</div>
  <div class="row">
    <div class="swatch"><div class="block" style="background:var(--color-neutral-25);border:1px solid #e8e8e8;"></div><div class="step">25</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-50);border:1px solid #e8e8e8;"></div><div class="step">50</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-100);"></div><div class="step">100</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-200);"></div><div class="step">200</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-300);"></div><div class="step">300</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-400);"></div><div class="step">400</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-500);"></div><div class="step">500</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-600);"></div><div class="step">600</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-700);"></div><div class="step">700</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-800);"></div><div class="step">800</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-neutral-900);"></div><div class="step">900</div></div>
  </div>
  <div class="label">Content & Background</div>
  <div class="sm-row">
    <div class="sm-swatch"><div class="sm-block" style="background:#fff;border:1px solid #e8e8e8;"></div><div class="sm-name">White</div><div class="sm-hex">#FFFFFF</div></div>
    <div class="sm-swatch"><div class="sm-block" style="background:#000;"></div><div class="sm-name">Black</div><div class="sm-hex">#000000</div></div>
    <div class="sm-swatch"><div class="sm-block" style="background:var(--color-bg-grey);border:1px solid #e8e8e8;"></div><div class="sm-name">Neutral Grey</div><div class="sm-hex">#F3F4F4</div></div>
    <div class="sm-swatch"><div class="sm-block" style="background:var(--color-bg-sand);border:1px solid #e8e8e8;"></div><div class="sm-name">Neutral Sand</div><div class="sm-hex">#F1F1F3</div></div>
  </div>
</body>
</html>
