<!-- @dsCard group="Spacing" viewport="700x340" name="Spacing Scale" subtitle="2px base unit · 16 steps" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px; background: #fff; font-family: var(--font-primary); }
    .row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
    .bar-wrap { flex: 1; }
    .bar { height: 8px; background: var(--color-primary-500); border-radius: 9999px; min-width: 2px; }
    .token { width: 130px; font-size: 11px; color: var(--color-neutral-500); font-weight: 500; flex-shrink: 0; }
    .px    { width: 48px; font-size: 11px; color: var(--color-neutral-400); text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="row"><div class="token">--space-1</div><div class="bar-wrap"><div class="bar" style="width:2px"></div></div><div class="px">2px</div></div>
  <div class="row"><div class="token">--space-2</div><div class="bar-wrap"><div class="bar" style="width:4px"></div></div><div class="px">4px</div></div>
  <div class="row"><div class="token">--space-3</div><div class="bar-wrap"><div class="bar" style="width:8px"></div></div><div class="px">8px</div></div>
  <div class="row"><div class="token">--space-4</div><div class="bar-wrap"><div class="bar" style="width:12px"></div></div><div class="px">12px</div></div>
  <div class="row"><div class="token">--space-5</div><div class="bar-wrap"><div class="bar" style="width:16px"></div></div><div class="px">16px</div></div>
  <div class="row"><div class="token">--space-6</div><div class="bar-wrap"><div class="bar" style="width:20px"></div></div><div class="px">20px</div></div>
  <div class="row"><div class="token">--space-7</div><div class="bar-wrap"><div class="bar" style="width:24px"></div></div><div class="px">24px</div></div>
  <div class="row"><div class="token">--space-8</div><div class="bar-wrap"><div class="bar" style="width:32px"></div></div><div class="px">32px</div></div>
  <div class="row"><div class="token">--space-9</div><div class="bar-wrap"><div class="bar" style="width:40px"></div></div><div class="px">40px</div></div>
  <div class="row"><div class="token">--space-10</div><div class="bar-wrap"><div class="bar" style="width:48px"></div></div><div class="px">48px</div></div>
  <div class="row"><div class="token">--space-11</div><div class="bar-wrap"><div class="bar" style="width:56px"></div></div><div class="px">56px</div></div>
  <div class="row"><div class="token">--space-12</div><div class="bar-wrap"><div class="bar" style="width:64px"></div></div><div class="px">64px</div></div>
  <div class="row"><div class="token">--space-14</div><div class="bar-wrap"><div class="bar" style="width:80px"></div></div><div class="px">80px</div></div>
  <div class="row"><div class="token">--space-16</div><div class="bar-wrap"><div class="bar" style="width:96px"></div></div><div class="px">96px</div></div>
  <div class="row"><div class="token">--space-20</div><div class="bar-wrap"><div class="bar" style="width:128px"></div></div><div class="px">128px</div></div>
  <div class="row"><div class="token">--space-24</div><div class="bar-wrap"><div class="bar" style="width:160px"></div></div><div class="px">160px</div></div>
</body>
</html>
