<!-- @dsCard group="Colors" viewport="700x150" name="Warm Orange" subtitle="Secondary palette · #E07818 base" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px; background: #fff; font-family: var(--font-primary); }
    .row { display: flex; gap: 6px; }
    .swatch { flex: 1; min-width: 0; }
    .block { height: 64px; border-radius: 6px; }
    .step { font-size: 10px; font-weight: 500; color: var(--color-neutral-500); margin-top: 5px; }
    .hex  { font-size: 9px; color: var(--color-neutral-400); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-50);border:1px solid #e8e8e8;"></div><div class="step">50</div><div class="hex">#FFF8F0</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-100);"></div><div class="step">100</div><div class="hex">#FFECD4</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-200);"></div><div class="step">200</div><div class="hex">#FFD4A0</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-300);"></div><div class="step">300</div><div class="hex">#FFB870</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-400);"></div><div class="step">400</div><div class="hex">#F5983C</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-500);position:relative;"><span style="position:absolute;bottom:6px;right:6px;background:rgba(255,255,255,0.25);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px;font-family:var(--font-primary)">base</span></div><div class="step">500</div><div class="hex">#E07818</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-600);"></div><div class="step">600</div><div class="hex">#C06014</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-700);"></div><div class="step">700</div><div class="hex">#9A4C0E</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-800);"></div><div class="step">800</div><div class="hex">#72340A</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-warm-orange-900);"></div><div class="step">900</div><div class="hex">#52180F</div></div>
  </div>
</body>
</html>
