<!-- @dsCard group="Colors" viewport="700x150" name="Primary Blue" subtitle="10-step brand primary · #3040CC base" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { margin: 0; padding: 20px 24px; background: #fff; font-family: var(--font-primary); }
    .row { display: flex; gap: 6px; }
    .swatch { flex: 1; min-width: 0; }
    .block { height: 64px; border-radius: 6px; }
    .step { font-size: 10px; font-weight: 500; color: var(--color-neutral-500); margin-top: 5px; }
    .hex  { font-size: 9px; color: var(--color-neutral-400); font-variant-numeric: tabular-nums; margin-top: 1px; letter-spacing: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="block" style="background:var(--color-primary-50);border:1px solid #e8e8e8;"></div><div class="step">50</div><div class="hex">#EEF1FF</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-100);"></div><div class="step">100</div><div class="hex">#D4D9FD</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-200);"></div><div class="step">200</div><div class="hex">#ACB4FA</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-300);"></div><div class="step">300</div><div class="hex">#7E8EF5</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-400);"></div><div class="step">400</div><div class="hex">#5363E5</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-500);position:relative;"><span style="position:absolute;bottom:6px;right:6px;background:rgba(255,255,255,0.25);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px;font-family:var(--font-primary)">base</span></div><div class="step">500</div><div class="hex">#3040CC</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-600);"></div><div class="step">600</div><div class="hex">#2430B0</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-700);"></div><div class="step">700</div><div class="hex">#192290</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-800);"></div><div class="step">800</div><div class="hex">#10166A</div></div>
    <div class="swatch"><div class="block" style="background:var(--color-primary-900);"></div><div class="step">900</div><div class="hex">#080D42</div></div>
  </div>
</body>
</html>
