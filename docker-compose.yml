services:
  backend:
    build:
      context: ./backend
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./ui-kits:/ui-kits:ro
      - /app/node_modules
    depends_on:
      - backend
